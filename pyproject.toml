[project]
name = "muse-vcs"
version = "0.1.0"
description = "Muse VCS — git-style version control for musical compositions"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "httpx>=0.26.0",
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "asyncpg>=0.29.0",
    "typer>=0.9.0",
    "toml>=0.10.0",
    "mido>=1.3.0",
]

[project.scripts]
muse = "maestro.muse_cli.app:cli"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "anyio>=4.2.0",
    "mypy>=1.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
cache_dir = "/tmp/pytest_cache"
addopts = "-v --tb=short"
filterwarnings = [
    "ignore:The 'is_flag' and 'flag_value' parameters are not supported by Typer:DeprecationWarning",
]

[tool.mypy]
python_version = "3.11"
strict = true
explicit_package_bases = true
namespace_packages = true
warn_unreachable = true
show_error_codes = true

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_decorators = false

[[tool.mypy.overrides]]
module = ["boto3", "botocore.*", "gradio_client", "mido", "yaml", "toml"]
ignore_missing_imports = true

[tool.hatch.build.targets.wheel]
packages = ["maestro"]
