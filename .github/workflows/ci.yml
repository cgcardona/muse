name: CI

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    name: Tests & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Run mypy
        run: mypy muse/
